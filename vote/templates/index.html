<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ option_a }} vs {{ option_b }}!</title>
    <base href="/index.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="docker-compose, docker, stack">
    <meta name="author" content="Tutum dev team">

    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheets/style.css') }}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.4.0/css/font-awesome.min.css">
</head>

<body>
    <div id="content-container">
        <div id="content-container-center">
            <h3>{{ option_a }} vs {{ option_b }}!</h3>

            <form id="choice" name="form" method="POST" action="/">
                <button id="a" type="submit" name="vote" class="a" value="a">
                    {{ option_a }}
                </button>
                <button id="b" type="submit" name="vote" class="b" value="b">
                    {{ option_b }}
                </button>
            </form>

            <div id="tip">
                (Tip: you can change your vote)
            </div>

            <div id="hostname">
                Processed by container ID {{ hostname }}
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.js"></script>

    {% if vote %}
    <script>
        $(document).ready(function() {
            const userVote = "{{ vote }}";
            const optionA = "{{ option_a }}";
            const optionB = "{{ option_b }}";
            const checkIcon = ' <i class="fa fa-check-circle"></i>';

            if (userVote === "a") {
                $("#a").prop('disabled', true).html(optionA + checkIcon);
                $("#b").css('opacity', '0.5');
            } else if (userVote === "b") {
                $("#b").prop('disabled', true).html(optionB + checkIcon);
                $("#a").css('opacity', '0.5');
            }
        });
    </script>
    {% endif %}
</body>
</html>
